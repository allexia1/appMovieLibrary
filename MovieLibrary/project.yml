name: MovieLibraryApp
options:
  bundleIdPrefix: com.movielibrary
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig
packages:
  NetworkingKit:
    path: Packages/NetworkingKit
targets:
  MovieLibraryApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MovieLibraryApp
    dependencies:
      - package: NetworkingKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.movielibrary.MovieLibraryApp
        INFOPLIST_FILE: MovieLibraryApp/AppSetupFiles/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
  MovieLibraryAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MovieLibraryAppTests
    dependencies:
      - target: MovieLibraryApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.movielibrary.MovieLibraryAppTests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  MovieLibraryApp:
    build:
      targets:
        MovieLibraryApp: all
        MovieLibraryAppTests: [test]
    test:
      targets:
        - MovieLibraryAppTests
    run:
      config: Debug
